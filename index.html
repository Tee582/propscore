<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropScore — Property Investment Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;--bg4:#252b3b;
  --border:#2d3348;--border2:#3a4060;
  --text:#e8eaf2;--text2:#9ba3bf;--text3:#6b7494;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-b:rgba(34,197,94,.3);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.12);--amber-b:rgba(245,158,11,.3);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-b:rgba(239,68,68,.3);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--blue-b:rgba(59,130,246,.3);
  --accent:#6366f1;--accent-bg:rgba(99,102,241,.15);--accent-b:rgba(99,102,241,.4);
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:15px;line-height:1.6}

/* Layout */
#sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;z-index:100}
#main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50}
#content{padding:28px;flex:1}

/* Sidebar */
.brand{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.brand h1{font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.brand span{color:var(--accent)}
.brand p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
nav{padding:12px 10px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:12px 10px 6px}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);color:var(--text2);font-size:13.5px;font-weight:400;cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-link svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-link:hover{background:var(--bg4);color:var(--text)}
.nav-link.active{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-b)}
.nav-link.active svg{opacity:1}

/* Topbar */
#page-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg3);border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.btn-sm{padding:6px 12px;font-size:12.5px}
.btn svg{width:15px;height:15px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{padding:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px}

/* Grid */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
h2{font-size:20px;font-weight:600;letter-spacing:-.3px}
h3{font-size:16px;font-weight:600;letter-spacing:-.2px}

/* Score badge */
.score-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.score-sm{width:36px;height:36px;font-size:13px}
.score-xs{width:28px;height:28px;font-size:11px}
.score-great{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-b)}
.score-good{background:var(--amber-bg);color:var(--amber);border:1.5px solid var(--amber-b)}
.score-poor{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-b)}
.score-na{background:var(--bg4);color:var(--text3);border:1.5px solid var(--border2)}

/* Tag/badge */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.tag-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.tag-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.tag-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span-2{grid-column:span 2}
label{font-size:12px;font-weight:500;color:var(--text2)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 11px;font-size:13.5px;color:var(--text);font-family:var(--font);transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
.form-section{margin-bottom:24px}
.form-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}

/* Property card */
.prop-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:12px}
.prop-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.prop-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.prop-card-name{font-size:16px;font-weight:600;letter-spacing:-.2px}
.prop-card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.cat-scores{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px}
.cat-score-item{text-align:center}
.cat-score-label{font-size:10px;color:var(--text3);margin-top:3px}

/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead tr{background:var(--bg3);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.td-name{font-weight:500;font-size:14px}
.td-mono{font-family:var(--mono);font-size:13px}

/* Compare */
.compare-grid{display:grid;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.compare-row{display:grid;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none}
.compare-label{background:var(--bg3);padding:10px 16px;font-size:12px;color:var(--text2);font-weight:500;border-right:1px solid var(--border)}
.compare-val{padding:10px 14px;font-size:13px;text-align:center}
.compare-header{background:var(--accent-bg);padding:12px 14px;text-align:center;font-weight:600;font-size:13px;border-right:1px solid var(--accent-b)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:min(640px,95vw);max-height:85vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-body{padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.close-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;display:flex}
.close-btn:hover{color:var(--text);background:var(--bg4)}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13.5px;min-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .2s ease}
.toast-success{border-left:3px solid var(--green)}
.toast-error{border-left:3px solid var(--red)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin:0 auto 16px;opacity:.3}
.empty h3{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:6px}
.empty p{font-size:13.5px}

/* Misc */
.divider{height:1px;background:var(--border);margin:20px 0}
.text-muted{color:var(--text3)}
.text-sm{font-size:13px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.mb-4{margin-bottom:4px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.mb-24{margin-bottom:24px}
.mt-4{margin-top:4px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{opacity:.4;pointer-events:none}
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="brand">
    <h1><span>Prop</span>Score</h1>
    <p>Investment Analysis</p>
  </div>
  <nav>
    <div class="nav-section">Menu</div>
    <button class="nav-link active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-link" data-page="properties" onclick="navigate('properties')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      My Properties
    </button>
    <button class="nav-link" data-page="compare" onclick="navigate('compare')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Compare
    </button>
    <div class="nav-section">Analysis</div>
    <button class="nav-link" data-page="new" onclick="navigate('new')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      New Analysis
    </button>
  </nav>
</aside>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <span id="page-title">Dashboard</span>
    <div class="flex gap-8">
      <button class="btn btn-secondary btn-sm" onclick="navigate('compare')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Compare
      </button>
      <button class="btn btn-primary btn-sm" onclick="navigate('new')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Analysis
      </button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- Toast container -->
<div id="toast"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let allProperties = [];
let currentPage = 'dashboard';
let editingId = null;
let compareIds = new Set();
let radarChart = null;

// ─── Nav ─────────────────────────────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const titles = { dashboard:'Dashboard', properties:'My Properties', compare:'Compare', new:'New Analysis' };
  document.getElementById('page-title').textContent = titles[page] || page;
  renderPage();
}

function renderPage() {
  switch(currentPage) {
    case 'dashboard': renderDashboard(); break;
    case 'properties': renderProperties(); break;
    case 'compare': renderCompare(); break;
    case 'new': renderForm(); break;
  }
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  const res = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts });
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || res.statusText);
  return res.json();
}

async function loadProperties(sort='score_overall', order='desc') {
  allProperties = await apiFetch(`/api/properties?sort=${sort}&order=${order}`);
  return allProperties;
}

// ─── Scoring helpers ─────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s === null || s === undefined) return 'score-na';
  return s >= 7 ? 'score-great' : s >= 5 ? 'score-good' : 'score-poor';
}
function scoreLabel(s) {
  if (s === null || s === undefined) return '—';
  return s >= 8 ? 'Excellent' : s >= 7 ? 'Strong' : s >= 6 ? 'Good' : s >= 5 ? 'Moderate' : s >= 4 ? 'Weak' : 'Poor';
}
function tagClass(s) {
  if (!s) return 'tag-gray';
  return s >= 7 ? 'tag-green' : s >= 5 ? 'tag-amber' : 'tag-red';
}
function fmt(v, suffix='') { return v != null ? Number(v).toLocaleString() + suffix : '—'; }
function fmtPct(v) { return v != null ? Number(v).toFixed(2) + '%' : '—'; }
function fmtVal(v) { return v != null ? '$' + Number(v).toLocaleString() : '—'; }

// ─── Dashboard ───────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="loading" style="text-align:center;padding:60px;color:var(--text3)">Loading...</div>`;
  await loadProperties();
  
  const props = allProperties;
  const total = props.length;
  const avgScore = total ? (props.reduce((a,b)=>a+(+b.score_overall||0),0)/total).toFixed(1) : '—';
  const top = props.filter(p=>p.score_overall>=7).length;
  const avgYield = total ? (props.filter(p=>p.gross_yield).reduce((a,b)=>a+(+b.gross_yield),0) / props.filter(p=>p.gross_yield).length || 0).toFixed(2) : '—';
  
  const recentCards = props.slice(0,3).map(p => propCardHTML(p)).join('');
  
  el.innerHTML = `
    <div class="mb-24">
      <div class="flex-between mb-16">
        <div>
          <h2>Welcome back</h2>
          <p class="text-muted text-sm mt-4">Your property investment portfolio at a glance</p>
        </div>
      </div>

      <div class="grid-4 mb-24">
        <div class="stat-card">
          <div class="text-muted text-sm mb-8">Total Analyses</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono)">${total}</div>
        </div>
        <div class="stat-card">
          <div class="text-muted text-sm mb-8">Avg Portfolio Score</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:${avgScore>=7?'var(--green)':avgScore>=5?'var(--amber)':'var(--red)'}">${avgScore}</div>
        </div>
        <div class="stat-card">
          <div class="text-muted text-sm mb-8">Strong Opportunities</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--green)">${top}</div>
        </div>
        <div class="stat-card">
          <div class="text-muted text-sm mb-8">Avg Gross Yield</div>
          <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--amber)">${avgYield !== '—' ? avgYield+'%' : '—'}</div>
        </div>
      </div>

      ${total === 0 ? `
        <div class="empty card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          <h3>No properties yet</h3>
          <p>Run your first analysis to see your dashboard</p>
          <button class="btn btn-primary" style="margin:16px auto 0" onclick="navigate('new')">New Analysis</button>
        </div>
      ` : `
        <div class="section-header">
          <span class="section-title">Top Properties</span>
          <button class="btn btn-secondary btn-sm" onclick="navigate('properties')">View all →</button>
        </div>
        <div class="grid-auto">${recentCards}</div>
      `}
    </div>
  `;
}

// ─── Property Card ────────────────────────────────────────────────────────────
function propCardHTML(p) {
  const sc = p.score_overall;
  const cats = [
    {label:'Demand',val:p.score_demand},
    {label:'Returns',val:p.score_returns},
    {label:'Growth',val:p.score_growth},
    {label:'Risk',val:p.score_risk},
    {label:'Afford.',val:p.score_affordability},
  ];
  return `
    <div class="prop-card" onclick="openPropDetail(${p.id})">
      <div class="prop-card-header">
        <div style="flex:1">
          <div class="prop-card-name">${p.suburb || 'Unknown suburb'}</div>
          <div class="prop-card-sub">${[p.state, p.postcode].filter(Boolean).join(' ')} ${p.typical_value ? '· '+fmtVal(p.typical_value) : ''}</div>
        </div>
        <div>
          <div class="score-circle ${scoreClass(sc)}">${sc != null ? Number(sc).toFixed(1) : '—'}</div>
        </div>
      </div>
      <div class="flex gap-8" style="flex-wrap:wrap">
        ${p.gross_yield ? `<span class="tag tag-blue">Yield ${fmtPct(p.gross_yield)}</span>` : ''}
        ${p.growth_triangulated ? `<span class="tag tag-green">36M +${Number(p.growth_triangulated).toFixed(1)}%</span>` : ''}
        ${p.vacancy_rate != null ? `<span class="tag ${p.vacancy_rate<1?'tag-green':p.vacancy_rate<2?'tag-amber':'tag-red'}">Vacancy ${fmtPct(p.vacancy_rate)}</span>` : ''}
      </div>
      <div class="cat-scores">
        ${cats.map(c=>`
          <div class="cat-score-item">
            <div class="score-circle score-xs ${scoreClass(c.val)}" style="margin:0 auto">${c.val!=null?Number(c.val).toFixed(1):'—'}</div>
            <div class="cat-score-label">${c.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="flex gap-8" style="justify-content:flex-end">
        <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editProperty(${p.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteProperty(${p.id})">Delete</button>
      </div>
    </div>
  `;
}

// ─── Properties Page ──────────────────────────────────────────────────────────
async function renderProperties(sort='score_overall', order='desc') {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="loading" style="text-align:center;padding:60px;color:var(--text3)">Loading...</div>`;
  await loadProperties(sort, order);
  
  if (!allProperties.length) {
    el.innerHTML = `<div class="empty card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><h3>No analyses saved yet</h3><p>Add your first property analysis to get started</p><button class="btn btn-primary" style="margin:16px auto 0" onclick="navigate('new')">New Analysis</button></div>`;
    return;
  }

async function renderCompare() {
  const el = document.getElementById('content');
  await loadProperties();
  
  const selected = allProperties.filter(p => compareIds.has(p.id));

  el.innerHTML = `
    <div class="flex-between mb-16">
      <h2>Compare Properties</h2>
      <div class="flex gap-8">
        ${compareIds.size > 0 ? `<button class="btn btn-secondary btn-sm" onclick="compareIds.clear();renderCompare()">Clear selection</button>` : ''}
      </div>
    </div>
    <div class="card mb-20">
      <div class="form-section-title mb-8">Select properties to compare (up to 4)</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${allProperties.length === 0 ? `<p class="text-muted text-sm">No properties saved yet</p>` : allProperties.map(p=>`
          <label style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${compareIds.has(p.id)?'var(--accent-bg)':'var(--bg3)'};border:1px solid ${compareIds.has(p.id)?'var(--accent-b)':'var(--border)'};border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s">
            <input type="checkbox" ${compareIds.has(p.id)?'checked':''} onchange="toggleCompare(${p.id});renderCompare()" style="width:auto;accent-color:var(--accent)">
            <span>${p.suburb} <span style="color:var(--text3)">${p.state||''}</span></span>
            ${p.score_overall!=null?`<span class="tag ${tagClass(p.score_overall)} text-sm">${Number(p.score_overall).toFixed(1)}</span>`:''}
          </label>
        `).join('')}
      </div>
    </div>
    ${selected.length < 2 ? `
      <div class="empty" style="padding:40px">
        <p class="text-muted">Select at least 2 properties above to compare them</p>
      </div>
    ` : buildCompareTable(selected)}
  `;
}

function toggleCompare(id) {
  if (compareIds.has(id)) compareIds.delete(id);
  else if (compareIds.size < 4) compareIds.add(id);
}

function buildCompareTable(props) {
  const cols = props.length + 1;
  const colStyle = `grid-template-columns: 200px ${props.map(()=>'1fr').join(' ')}`;
  
  const rows = [
    {section:'Property Info'},
    {label:'Suburb', key:p=>p.suburb||'—'},
    {label:'State / Postcode', key:p=>[p.state,p.postcode].filter(Boolean).join(' ')||'—'},
    {label:'Typical Value', key:p=>p.typical_value?'$'+Number(p.typical_value).toLocaleString():'—'},
    {section:'Overall Score'},
    {label:'Overall Score', key:p=>p.score_overall!=null?Number(p.score_overall).toFixed(1):'—', color:p=>scoreClass(p.score_overall)},
    {label:'Rating', key:p=>scoreLabel(p.score_overall)},
    {section:'Category Scores'},
    {label:'Demand & Supply', key:p=>p.score_demand!=null?Number(p.score_demand).toFixed(1):'—', color:p=>scoreClass(p.score_demand)},
    {label:'Investment Returns', key:p=>p.score_returns!=null?Number(p.score_returns).toFixed(1):'—', color:p=>scoreClass(p.score_returns)},
    {label:'Growth Outlook', key:p=>p.score_growth!=null?Number(p.score_growth).toFixed(1):'—', color:p=>scoreClass(p.score_growth)},
    {label:'Risk Profile', key:p=>p.score_risk!=null?Number(p.score_risk).toFixed(1):'—', color:p=>scoreClass(p.score_risk)},
    {label:'Affordability', key:p=>p.score_affordability!=null?Number(p.score_affordability).toFixed(1):'—', color:p=>scoreClass(p.score_affordability)},
    {section:'Key Metrics'},
    {label:'Gross Yield', key:p=>p.gross_yield!=null?Number(p.gross_yield).toFixed(2)+'%':'—'},
    {label:'Vacancy Rate', key:p=>p.vacancy_rate!=null?Number(p.vacancy_rate).toFixed(2)+'%':'—'},
    {label:'Demand-Supply Ratio', key:p=>p.dsr||'—'},
    {label:'Days on Market', key:p=>p.days_on_market||'—'},
    {label:'36M Value Growth', key:p=>p.growth_triangulated!=null?'+'+Number(p.growth_triangulated).toFixed(1)+'%':'—'},
    {label:'36M Rental Growth', key:p=>p.rental_growth_36m!=null?'+'+Number(p.rental_growth_36m).toFixed(1)+'%':'—'},
    {label:'10yr Growth Rate', key:p=>p.ten_year_growth!=null?Number(p.ten_year_growth).toFixed(1)+'%':'—'},
    {label:'Vendor Discounting', key:p=>p.vendor_discount!=null?Number(p.vendor_discount).toFixed(2)+'%':'—'},
    {section:'Demographics'},
    {label:'HH Income > State Avg', key:p=>p.household_income_above_avg===true?'Yes':p.household_income_above_avg===false?'No':'—'},
    {label:'Professional Occ > State Avg', key:p=>p.professional_occ_above_avg===true?'Yes':p.professional_occ_above_avg===false?'No':'—'},
    {label:'Stat. Reliability', key:p=>p.statistical_reliability||'—'},
  ];

  return `
    <div class="compare-grid" style="${colStyle}">
      <div class="compare-label" style="background:var(--bg2);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase">Metric</div>
      ${props.map(p=>`<div class="compare-header">${p.suburb||'Unknown'}<br><span style="font-size:11px;font-weight:400;opacity:.7">${[p.state,p.postcode].filter(Boolean).join(' ')}</span></div>`).join('')}
      ${rows.map(r=>{
        if (r.section) return `<div class="compare-row" style="${colStyle};grid-column:1/-1;background:var(--bg3)"><div style="padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)">${r.section}</div></div>`;
        return `
          <div class="compare-row" style="${colStyle}">
            <div class="compare-label">${r.label}</div>
            ${props.map(p=>{
              const v = r.key(p);
              const cls = r.color ? r.color(p) : '';
              return `<div class="compare-val ${cls==='score-great'?'':''}"><span ${cls?`class="tag ${cls==='score-great'?'tag-green':cls==='score-good'?'tag-amber':cls==='score-poor'?'tag-red':'tag-gray'}"`:''}>${v}</span></div>`;
            }).join('')}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function updateLiveScore() {
  const nv = id => { const v=parseFloat(document.getElementById(id)?.value); return isNaN(v)?null:v; };
  const sv = id => document.getElementById(id)?.value || '';

  const vac=nv('f_vac'),dsr=nv('f_dsr'),dom=nv('f_dom'),stk=nv('f_stk'),si=nv('f_si');
  const yld=nv('f_yield'),gTri=nv('f_g_tri'),r36=nv('f_r36');
  const t10=nv('f_10yr'),hhi=sv('f_hhi'),pro=sv('f_pro');
  const disc=nv('f_disc'),bld=nv('f_bld'),stat=nv('f_stat');
  const raff=nv('f_raff'),maff=nv('f_maff');

  const avg = arr => { const v=arr.filter(x=>x!==null); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };

  const demand = avg([
    vac!=null?(vac<0.5?10:vac<1?8:vac<2?5:vac<3?3:1):null,
    dsr!=null?(dsr>=70?10:dsr>=60?8:dsr>=50?6:dsr>=40?4:2):null,
    dom!=null?(dom<20?10:dom<30?8:dom<45?6:dom<60?4:2):null,
    stk!=null?(stk<0.3?10:stk<0.5?8:stk<1?6:stk<1.5?4:2):null,
    si!=null?(si>=100?10:si>=70?8:si>=50?6:si>=30?4:2):null,
  ]);
  const returns = avg([
    yld!=null?(yld>=7?10:yld>=6?8:yld>=5?6:yld>=4?4:2):null,
    gTri!=null?(gTri>=50?10:gTri>=40?8:gTri>=30?6:gTri>=20?5:gTri>=10?3:1):null,
    r36!=null?(r36>=25?10:r36>=20?8:r36>=15?6:r36>=10?4:2):null,
  ]);
  const growth = avg([
    t10!=null?(t10>=12?10:t10>=10?8:t10>=8?6:t10>=6?4:2):null,
    hhi?(hhi==='yes'?10:3):null,
    pro?(pro==='yes'?10:3):null,
  ]);
  const risk = avg([
    disc!=null?(disc<-2?10:disc<0?8:disc<2?5:disc<4?3:1):null,
    bld!=null?(bld<1?10:bld<2?8:bld<3?5:bld<4?3:1):null,
    stat!=null?(stat>=70?10:stat>=60?8:stat>=50?6:stat>=40?4:2):null,
  ]);
  const afford = avg([
    raff!=null?(raff>=60?10:raff>=50?8:raff>=40?6:4):null,
    maff!=null?(maff>=80?10:maff>=70?8:maff>=60?6:4):null,
  ]);
  const cats = [demand,returns,growth,risk,afford];
  const validCats = cats.filter(x=>x!==null);
  const overall = validCats.length ? avg(cats) : null;

  const ov = document.getElementById('ls-overall');
  if (ov && overall !== null) {
    ov.innerHTML = `
      <div class="score-circle ${scoreClass(overall)}" style="margin:0 auto;width:64px;height:64px;font-size:22px">${overall.toFixed(1)}</div>
      <div style="font-size:13px;margin-top:8px;color:${overall>=7?'var(--green)':overall>=5?'var(--amber)':'var(--red)'}">${scoreLabel(overall)}</div>
    `;
  } else if (ov) {
    ov.innerHTML = `<div class="score-circle score-na" style="margin:0 auto;width:64px;height:64px;font-size:22px">—</div><div style="font-size:13px;color:var(--text3);margin-top:8px">Enter data to score</div>`;
  }

  const catNames = ['Demand','Returns','Growth','Risk','Afford.'];
  const catsEl = document.getElementById('ls-cats');
  if (catsEl) {
    catsEl.innerHTML = cats.map((s,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="color:var(--text2)">${catNames[i]}</span>
        <span class="tag ${tagClass(s)}">${s!=null?s.toFixed(1):'—'}</span>
      </div>
    `).join('');
  }

  const radarData = cats.map(s=>s!=null?Math.round(s*10)/10:0);
  const canvas = document.getElementById('ls-radar');
  if (!canvas) return;
  if (radarChart) { radarChart.data.datasets[0].data=radarData; radarChart.update('none'); return; }
  radarChart = new Chart(canvas.getContext('2d'), {
    type:'radar',
    data:{ labels:['Demand','Returns','Growth','Risk','Afford.'],datasets:[{data:radarData,backgroundColor:'rgba(99,102,241,.12)',borderColor:'#6366f1',borderWidth:1.5,pointBackgroundColor:'#6366f1',pointRadius:3}]},
    options:{ responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:10,ticks:{stepSize:2,font:{size:10},color:'rgba(255,255,255,.3)',backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.08)'},pointLabels:{font:{size:11},color:'rgba(255,255,255,.5)'}}}}
  });
}

// ─── Form submit ──────────────────────────────────────────────────────────────
async function submitForm(id) {
  const g = k => document.getElementById(k)?.value ?? '';
  const n = k => { const v=parseFloat(g(k)); return isNaN(v)?null:v; };
  const data = {
    suburb:g('f_sub')||null, state:g('f_state')||null, postcode:g('f_post')||null, typical_value:n('f_val'),
    vacancy_rate:n('f_vac'), vacancy_trend:g('f_vac_t')||null, dsr:n('f_dsr'), dsr_trend:g('f_dsr_t')||null,
    days_on_market:n('f_dom'), dom_trend:g('f_dom_t')||null, stock_on_market:n('f_stk'), stock_trend:g('f_stk_t')||null,
    search_interest:n('f_si'), auction_clearance:n('f_auc'),
    gross_yield:n('f_yield'), yield_trend:g('f_yield_t')||null, renter_proportion:n('f_rent_p'), renter_trend:g('f_rent_pt')||null,
    growth_dsr:n('f_g_dsr'), growth_sqm:n('f_g_sqm'), growth_other:n('f_g_oth'), growth_triangulated:n('f_g_tri'),
    rental_growth_12m:n('f_r12'), rental_growth_36m:n('f_r36'), ten_year_growth:n('f_10yr'),
    vendor_discount:n('f_disc'), discount_trend:g('f_disc_t')||null, building_approvals:n('f_bld'), land_supply:g('f_land')||null,
    household_income_above_avg:g('f_hhi')||null, professional_occ_above_avg:g('f_pro')||null,
    rent_affordability:n('f_raff'), mortgage_affordability:n('f_maff'),
    statistical_reliability:n('f_stat'), stat_trend:g('f_stat_t')||null,
    notes:g('f_notes')||null,
  };

  try {
    if (id) {
      await apiFetch(`/api/properties/${id}`, {method:'PUT', body:JSON.stringify(data)});
      toast('Analysis updated successfully', 'success');
    } else {
      await apiFetch('/api/properties', {method:'POST', body:JSON.stringify(data)});
      toast('Analysis saved successfully', 'success');
    }
    radarChart = null;
    navigate('properties');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
}

// ─── Detail Modal ─────────────────────────────────────────────────────────────
async function openPropDetail(id) {
  const p = allProperties.find(x=>x.id===id) || await apiFetch(`/api/properties/${id}`);
  const sc = p.score_overall;
  const cats = [{l:'Demand & Supply',v:p.score_demand},{l:'Returns',v:p.score_returns},{l:'Growth',v:p.score_growth},{l:'Risk',v:p.score_risk},{l:'Affordability',v:p.score_affordability}];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target===overlay) closeModal(overlay); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3>${p.suburb||'Unknown'}</h3>
          <span style="font-size:13px;color:var(--text3)">${[p.state,p.postcode].filter(Boolean).join(' ')} ${p.typical_value?'· $'+Number(p.typical_value).toLocaleString():''}</span>
        </div>
        <button class="close-btn" onclick="closeModal(document.querySelector('.modal-overlay'))">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="flex-between mb-20">
          <div class="flex gap-12 align-items-center">
            <div class="score-circle ${scoreClass(sc)}" style="width:64px;height:64px;font-size:22px">${sc!=null?Number(sc).toFixed(1):'—'}</div>
            <div>
              <div style="font-size:18px;font-weight:600">${scoreLabel(sc)}</div>
              <div style="font-size:13px;color:var(--text3)">Overall investment score</div>
            </div>
          </div>
        </div>
        <div class="grid-3 mb-20">
          ${cats.map(c=>`
            <div class="stat-card" style="text-align:center">
              <div class="text-muted text-sm mb-8">${c.l}</div>
              <div class="score-circle ${scoreClass(c.v)}" style="margin:0 auto">${c.v!=null?Number(c.v).toFixed(1):'—'}</div>
            </div>
          `).join('')}
        </div>
        <div class="divider"></div>
        <div class="grid-2">
          <div><div class="form-section-title mb-8">Market</div>
            ${metricRow('Vacancy Rate', p.vacancy_rate!=null?Number(p.vacancy_rate).toFixed(2)+'%':null)}
            ${metricRow('Demand-Supply Ratio', p.dsr)}
            ${metricRow('Days on Market', p.days_on_market)}
            ${metricRow('Stock on Market', p.stock_on_market!=null?Number(p.stock_on_market).toFixed(2)+'%':null)}
            ${metricRow('Search Interest', p.search_interest)}
          </div>
          <div><div class="form-section-title mb-8">Returns</div>
            ${metricRow('Gross Yield', p.gross_yield!=null?Number(p.gross_yield).toFixed(2)+'%':null)}
            ${metricRow('36M Value Growth', p.growth_triangulated!=null?'+'+Number(p.growth_triangulated).toFixed(1)+'%':null)}
            ${metricRow('36M Rental Growth', p.rental_growth_36m!=null?'+'+Number(p.rental_growth_36m).toFixed(1)+'%':null)}
            ${metricRow('10yr Growth Rate', p.ten_year_growth!=null?Number(p.ten_year_growth).toFixed(1)+'%':null)}
          </div>
          <div><div class="form-section-title mb-8">Risk</div>
            ${metricRow('Vendor Discounting', p.vendor_discount!=null?Number(p.vendor_discount).toFixed(2)+'%':null)}
            ${metricRow('Building Approvals', p.building_approvals!=null?Number(p.building_approvals).toFixed(3):null)}
            ${metricRow('Statistical Reliability', p.statistical_reliability)}
          </div>
          <div><div class="form-section-title mb-8">Demographics</div>
            ${metricRow('HH Income > State', p.household_income_above_avg===true?'Yes':p.household_income_above_avg===false?'No':null)}
            ${metricRow('Prof. Occ > State', p.professional_occ_above_avg===true?'Yes':p.professional_occ_above_avg===false?'No':null)}
            ${metricRow('Rent Affordability', p.rent_affordability!=null?Number(p.rent_affordability).toFixed(1)+'%':null)}
            ${metricRow('Mortgage Affordability', p.mortgage_affordability!=null?Number(p.mortgage_affordability).toFixed(1)+'%':null)}
          </div>
        </div>
        ${p.notes ? `<div class="divider"></div><div class="form-section-title mb-8">Notes</div><p style="font-size:13.5px;color:var(--text2)">${p.notes}</p>` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal(document.querySelector('.modal-overlay'))">Close</button>
        <button class="btn btn-primary" onclick="closeModal(document.querySelector('.modal-overlay'));editProperty(${p.id})">Edit</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function metricRow(label, val) {
  return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
    <span style="color:var(--text3)">${label}</span>
    <span style="font-weight:500;font-family:var(--mono)">${val!=null?val:'—'}</span>
  </div>`;
}

function closeModal(el) { if (el) { el.remove(); radarChart = null; } }

// ─── Edit / Delete ────────────────────────────────────────────────────────────
async function editProperty(id) {
  const p = allProperties.find(x=>x.id===id) || await apiFetch(`/api/properties/${id}`);
  navigate('new');
  radarChart = null;
  // Map boolean back to string for selects
  const data = {...p, household_income_above_avg: p.household_income_above_avg===true?'yes':p.household_income_above_avg===false?'no':'', professional_occ_above_avg: p.professional_occ_above_avg===true?'yes':p.professional_occ_above_avg===false?'no':''};
  renderForm(data);
}

async function deleteProperty(id) {
  if (!confirm('Delete this property analysis? This cannot be undone.')) return;
  try {
    await apiFetch(`/api/properties/${id}`, {method:'DELETE'});
    toast('Deleted', 'success');
    await loadProperties();
    renderPage();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
navigate('dashboard');
</script>
</body>
</html>
